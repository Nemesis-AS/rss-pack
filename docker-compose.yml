services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_PATH: "file:/data/db.sqlite3"
      DATABASE_URL: "file:/data/db.sqlite3"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - sqlite-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sqlite-data:
  redis-data:
